<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:var(--bg,#08080f);font-family:'Montserrat',sans-serif;color:#fff}
#three-canvas{position:absolute;inset:0;z-index:0}
#accent-bar{position:absolute;left:0;top:0;width:6px;height:100%;z-index:30;background:linear-gradient(180deg,var(--accent,#ff0040),transparent 75%);box-shadow:0 0 30px var(--accent,#ff0040)}
#progress-bar{position:absolute;bottom:0;left:0;height:4px;z-index:40;background:linear-gradient(90deg,var(--accent,#ff0040),var(--accent2,#ff6b35));width:0;box-shadow:0 0 16px var(--accent,#ff0040)}
#channel-tag{position:absolute;right:60px;bottom:44px;z-index:40;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.3);text-transform:uppercase;opacity:0}
#scene{position:absolute;inset:0;z-index:10}
.scene-wrap{position:absolute;inset:0;opacity:0;pointer-events:none}
.scene-wrap.active{opacity:1;pointer-events:auto}

/* ── INTRO ── */
.s-intro{position:absolute;inset:0;display:flex;align-items:center}
.intro-left{flex:1;padding:0 90px}
.intro-eyebrow{font-size:13px;letter-spacing:9px;text-transform:uppercase;color:var(--accent);margin-bottom:22px;opacity:0;transform:translateX(-30px)}
.intro-tline{overflow:hidden;line-height:.85}
.intro-t{font-family:'Bebas Neue',sans-serif;font-size:172px;display:block;transform:translateY(110%)}
.intro-t.stroke{color:transparent;-webkit-text-stroke:2px rgba(255,0,64,.5)}
.intro-sub{margin-top:32px;max-width:580px;font-size:20px;font-weight:300;line-height:1.65;color:rgba(255,255,255,.5);opacity:0;transform:translateY(18px)}
.intro-sub strong{color:#fff;font-weight:700}
.intro-ghost{position:absolute;right:70px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:340px;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.04);user-select:none;pointer-events:none;opacity:0}

/* ── POINT ── */
.s-point{position:absolute;inset:0;display:flex}
.point-left{width:920px;padding:70px 80px;display:flex;flex-direction:column;justify-content:center}
.point-num-wrap{overflow:hidden}
.point-num{font-family:'Bebas Neue',sans-serif;font-size:210px;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.07);transform:translateY(115%)}
.point-hw{overflow:hidden}
.point-h{font-family:'Bebas Neue',sans-serif;font-size:112px;line-height:.9;color:#fff;transform:translateY(115%)}
.point-div{width:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent);margin:24px 0}
.point-body{font-size:24px;font-weight:300;line-height:1.72;color:rgba(255,255,255,.6);max-width:680px;opacity:0;transform:translateY(16px)}
.point-body strong{color:#fff;font-weight:600}
.point-tag{display:inline-block;margin-top:28px;padding:7px 18px;border:1px solid rgba(255,0,64,.3);color:var(--accent);font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:0}
.point-right{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.point-emoji-ring{width:360px;height:360px;border-radius:50%;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;font-size:160px;transform:scale(0) rotate(-15deg);backdrop-filter:blur(30px);box-shadow:0 0 60px rgba(255,0,64,.08)}
.ring-pulse{position:absolute;width:410px;height:410px;border-radius:50%;border:1px solid rgba(255,0,64,.12)}
.ring-pulse2{width:470px;height:470px}
.pdots{position:absolute;bottom:55px;left:80px;display:flex;gap:9px;opacity:0}
.pd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15)}
.pd.done{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.pd.now{background:#fff;width:22px;border-radius:3px}

/* ── OUTRO ── */
.s-outro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.outro-line{width:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 36px}
.outro-main{font-family:'Bebas Neue',sans-serif;font-size:140px;line-height:1;overflow:hidden}
.outro-main span{display:block;transform:translateY(115%)}
.outro-sub{font-size:22px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.45);margin-top:18px;opacity:0}
.outro-cta{margin-top:55px;padding:18px 55px;border:2px solid var(--accent);font-size:17px;letter-spacing:6px;text-transform:uppercase;color:var(--accent);opacity:0;transform:translateY(16px)}
.outro-icons{margin-top:44px;display:flex;gap:32px;opacity:0}
.oi{display:flex;flex-direction:column;align-items:center;gap:7px}
.oi span{font-size:40px}
.oi small{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase}
</style>
</head>
<body>
<canvas id="three-canvas"></canvas>
<div id="accent-bar"></div>
<div id="progress-bar"></div>
<div id="channel-tag"></div>
<audio id="bgm" loop></audio>
<div id="scene"></div>

<script>
// ════════════════════════════════════════════
//  CONFIG — injected by Python
// ════════════════════════════════════════════
const CONFIG = __CONFIG__;

// Color schemes
const SCHEMES = {
  red_black:         {bg:'#08080f',bg2:'#1a0812',accent:'#ff0040',accent2:'#ff6b35',p:'0xff0040'},
  neon_dark:         {bg:'#050510',bg2:'#0a0f20',accent:'#00ff88',accent2:'#00ccff',p:'0x00ff88'},
  white_bold:        {bg:'#0f0f0f',bg2:'#1a1a1a',accent:'#ffffff',accent2:'#cccccc',p:'0xffffff'},
  blue_professional: {bg:'#080f1a',bg2:'#0f1825',accent:'#0066ff',accent2:'#00aaff',p:'0x0066ff'},
  gold_dark:         {bg:'#0c0900',bg2:'#1a1400',accent:'#ffd700',accent2:'#ffaa00',p:'0xffd700'},
};
const SC = SCHEMES[CONFIG.color_scheme] || SCHEMES.red_black;
const r  = document.documentElement;
r.style.setProperty('--bg',     SC.bg);
r.style.setProperty('--accent', SC.accent);
r.style.setProperty('--accent2',SC.accent2);
document.body.style.background = SC.bg;

// Channel tag
const chEl = document.getElementById('channel-tag');
chEl.textContent = CONFIG.channel||'';
gsap.to(chEl,{opacity:1,duration:.6,delay:1.2});

// BGM
if(CONFIG.bgm_url){
  const bgm=document.getElementById('bgm');
  bgm.src=CONFIG.bgm_url; bgm.volume=0.18;
  bgm.play().catch(()=>{});
}

// ════════════════════════════════════════════
//  THREE.JS — Particle field
// ════════════════════════════════════════════
(function(){
  const canvas=document.getElementById('three-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(1920,1080); renderer.setPixelRatio(1);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,1920/1080,.1,2000);
  camera.position.set(0,0,80);

  const geo=new THREE.BufferGeometry();
  const count=2200, pos=new Float32Array(count*3);
  for(let i=0;i<count*3;i++) pos[i]=(Math.random()-.5)*600;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({
    color:parseInt(SC.p),size:.9,transparent:true,opacity:.35,sizeAttenuation:true
  })));

  const mkRing=(r,op)=>{
    const m=new THREE.Mesh(
      new THREE.TorusGeometry(r,.25,8,120),
      new THREE.MeshBasicMaterial({color:parseInt(SC.p),transparent:true,opacity:op})
    );
    scene.add(m); return m;
  };
  const ring1=mkRing(55,.08), ring2=mkRing(80,.05);
  ring1.rotation.x=Math.PI*.4; ring2.rotation.x=Math.PI*.3; ring2.rotation.y=Math.PI*.2;

  let t=0;
  window._threeCamera=camera;
  (function animate(){
    requestAnimationFrame(animate); t+=.004;
    ring1.rotation.z+=.003; ring2.rotation.z-=.002; ring2.rotation.x+=.001;
    camera.position.x=Math.sin(t*.3)*8; camera.position.y=Math.cos(t*.2)*4;
    camera.lookAt(0,0,0); renderer.render(scene,camera);
  })();
})();


// ════════════════════════════════════════════
//  XML GSAP EXECUTOR
//  Runs injected GSAP code from effects_library.db
// ════════════════════════════════════════════
function runXmlAnim(gsapCode, targetEl) {
  if (!gsapCode || !targetEl) return;
  try {
    // Replace {el} placeholder with actual element selector
    const id = 'xml_target_' + Math.random().toString(36).substr(2,6);
    targetEl.id = id;
    const code = gsapCode.replaceAll('{el}', '#'+id);
    // Execute GSAP code safely
    new Function('gsap', code)(gsap);
  } catch(e) {
    console.warn('[XML ANIM] Error:', e.message);
  }
}


// ════════════════════════════════════════════
//  SCENE BUILDERS
// ════════════════════════════════════════════
function buildIntro(sc){
  const lines=(sc.title_lines||[sc.title||CONFIG.topic]);
  const lHTML=lines.map((l,i)=>
    `<div class="intro-tline"><span class="intro-t${i===lines.length-1?' stroke':''}" data-line>${l}</span></div>`
  ).join('');
  const el=document.createElement('div');
  el.className='scene-wrap';
  el.innerHTML=`<div class="s-intro">
    <div class="intro-left">
      <div class="intro-eyebrow">${sc.eyebrow||CONFIG.niche}</div>
      ${lHTML}
      <div class="intro-sub">${sc.subtitle||''}</div>
    </div>
    <div class="intro-ghost" data-xml-target>${sc.count||''}</div>
  </div>`;
  el.dataset.gsap = sc.gsap_intro || '';
  return el;
}

function buildPoint(sc,pi,ptotal){
  let dots='';
  for(let i=0;i<ptotal;i++)
    dots+=`<div class="pd${i<pi?' done':i===pi?' now':''}"></div>`;
  const el=document.createElement('div');
  el.className='scene-wrap';
  el.innerHTML=`<div class="s-point">
    <div class="point-left">
      <div class="point-num-wrap"><div class="point-num">${sc.num||String(pi+1).padStart(2,'0')}</div></div>
      <div class="point-hw"><div class="point-h">${sc.heading||''}</div></div>
      <div class="point-div"></div>
      <div class="point-body">${sc.body||''}</div>
      <div class="point-tag">${sc.tag||'Key Insight'}</div>
    </div>
    <div class="point-right">
      <div class="ring-pulse"></div><div class="ring-pulse ring-pulse2"></div>
      <div class="point-emoji-ring" data-xml-target>${sc.emoji||'🧠'}</div>
    </div>
    <div class="pdots">${dots}</div>
  </div>`;
  el.dataset.gsap = sc.gsap_anim || '';
  return el;
}

function buildOutro(sc){
  const icons=(sc.icons||[]).map(ic=>
    `<div class="oi"><span>${ic.emoji}</span><small>${ic.label}</small></div>`).join('');
  const el=document.createElement('div');
  el.className='scene-wrap';
  el.innerHTML=`<div class="s-outro">
    <div class="outro-line"></div>
    <div class="outro-main"><span data-xml-target>${sc.heading||'FOLLOW FOR MORE'}</span></div>
    <div class="outro-sub">${sc.sub||CONFIG.channel}</div>
    <div class="outro-cta">${sc.cta||'👍 Like & Subscribe'}</div>
    <div class="outro-icons">${icons}</div>
  </div>`;
  el.dataset.gsap = sc.gsap_outro || '';
  return el;
}


// ════════════════════════════════════════════
//  GSAP ANIMATORS
// ════════════════════════════════════════════
function animateIntro(el){
  const tl=gsap.timeline();
  tl.to(el.querySelector('.intro-eyebrow'),  {opacity:1,x:0,    duration:.6,ease:'power2.out'},     .4)
    .to(el.querySelectorAll('[data-line]'),   {y:0,stagger:.14,  duration:.8,ease:'power3.out'},     .6)
    .to(el.querySelector('.intro-sub'),       {opacity:1,y:0,    duration:.7,ease:'power2.out'},    1.4)
    .to(el.querySelector('.intro-ghost'),     {opacity:1,        duration:.8,ease:'power2.out'},    1.0);

  // XML animation on ghost number
  const xmlTarget = el.querySelector('[data-xml-target]');
  setTimeout(()=>runXmlAnim(el.dataset.gsap, xmlTarget), 600);

  if(window._threeCamera)
    gsap.fromTo(window._threeCamera.position,{z:120},{z:75,duration:3,ease:'power2.out'});
}

function animatePoint(el){
  const tl=gsap.timeline();
  tl.to(el.querySelector('.point-num'),        {y:0,       duration:.65,ease:'power3.out'},          .15)
    .to(el.querySelector('.point-h'),          {y:0,       duration:.75,ease:'power3.out'},           .28)
    .to(el.querySelector('.point-div'),        {width:180, duration:.55,ease:'power2.out'},           .75)
    .to(el.querySelector('.point-body'),       {opacity:1,y:0,duration:.65,ease:'power2.out'},        .95)
    .to(el.querySelector('.point-tag'),        {opacity:1, duration:.4, ease:'power2.out'},           1.25)
    .to(el.querySelector('.point-emoji-ring'), {scale:1,rotation:0,duration:.8,ease:'back.out(1.4)'},.45)
    .to(el.querySelector('.pdots'),            {opacity:1, duration:.35,ease:'power2.out'},           1.4);

  gsap.to(el.querySelectorAll('.ring-pulse'),{
    scale:1.08,opacity:.7,duration:2,repeat:-1,yoyo:true,ease:'sine.inOut',stagger:.5
  });

  // XML animation on emoji ring
  const xmlTarget = el.querySelector('[data-xml-target]');
  setTimeout(()=>runXmlAnim(el.dataset.gsap, xmlTarget), 500);

  if(window._threeCamera)
    gsap.to(window._threeCamera.position,{z:72,duration:1.5,ease:'power2.inOut'});
}

function animateOutro(el){
  const tl=gsap.timeline();
  tl.to(el.querySelector('.outro-line'),       {width:180,duration:.7,ease:'power2.out'},            .3)
    .to(el.querySelector('.outro-main span'),  {y:0,      duration:.8,ease:'power3.out'},             .5)
    .to(el.querySelector('.outro-sub'),        {opacity:1,duration:.5,ease:'power2.out'},            1.1)
    .to(el.querySelector('.outro-cta'),        {opacity:1,y:0,duration:.6,ease:'power2.out'},        1.4)
    .to(el.querySelector('.outro-icons'),      {opacity:1,duration:.5,ease:'power2.out'},            1.8);

  const xmlTarget = el.querySelector('[data-xml-target]');
  setTimeout(()=>runXmlAnim(el.dataset.gsap, xmlTarget), 400);
}


// ════════════════════════════════════════════
//  SCENE ENGINE
// ════════════════════════════════════════════
const sceneEl    = document.getElementById('scene');
const progressEl = document.getElementById('progress-bar');
const SCENES     = CONFIG.scenes;
const totalMs    = SCENES.reduce((s,sc)=>s+sc.duration_ms,0);
const pointScenes= SCENES.filter(s=>s.type==='point');
let elapsed=0, idx=0;

function playScene(i){
  if(i>=SCENES.length) return;
  const sc=SCENES[i];

  let el;
  if(sc.type==='intro')      el=buildIntro(sc);
  else if(sc.type==='point') el=buildPoint(sc,pointScenes.indexOf(sc),pointScenes.length);
  else                       el=buildOutro(sc);

  sceneEl.appendChild(el);

  // Clip-path wipe in
  gsap.set(el,{clipPath:'inset(0 100% 0 0)'});
  gsap.to(el,{clipPath:'inset(0 0% 0 0)',duration:.45,ease:'power3.inOut',
    onComplete:()=>{
      el.classList.add('active');
      if(sc.type==='intro')      animateIntro(el);
      else if(sc.type==='point') animatePoint(el);
      else                       animateOutro(el);
    }
  });

  // Progress bar
  const s0=(elapsed/totalMs)*100, s1=((elapsed+sc.duration_ms)/totalMs)*100;
  gsap.set(progressEl,{width:s0+'%'});
  gsap.to(progressEl,{width:s1+'%',duration:sc.duration_ms/1000,ease:'none'});

  setTimeout(()=>{
    gsap.to(el,{clipPath:'inset(0 0% 0 100%)',duration:.35,ease:'power3.inOut',
      onComplete:()=>el.remove()});
    elapsed+=sc.duration_ms;
    playScene(++idx);
  }, sc.duration_ms);
}

playScene(0);
</script>
</body>
</html>
