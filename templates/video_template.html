<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px; overflow:hidden;
  background:var(--bg,#0a0a0f);
  font-family:'Montserrat',sans-serif; color:#fff;
}
:root {
  --bg:#0a0a0f; --bg2:#12101a;
  --accent:#ff0040; --accent2:#ff6b35;
  --muted:rgba(255,255,255,0.45);
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.07);
}

/* ── PERSISTENT LAYERS ── */
#bg-layer  { position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 130% 90% at 15% 50%,var(--bg2) 0%,var(--bg) 65%); }
#grid-layer {
  position:absolute;inset:0;z-index:1;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:80px 80px; animation:gridDrift 25s linear infinite;
}
@keyframes gridDrift { to { transform:translateY(80px); } }
#vignette  { position:absolute;inset:0;z-index:2;background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 35%,rgba(0,0,0,.8) 100%); }
#accent-bar { position:absolute;left:0;top:0;width:7px;height:100%;z-index:10;background:linear-gradient(180deg,var(--accent),transparent 80%);box-shadow:0 0 40px rgba(255,0,64,.4); }
#progress-bar { position:absolute;bottom:0;left:0;height:4px;z-index:20;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;box-shadow:0 0 20px var(--accent);transition:width .5s linear; }
#channel-tag  { position:absolute;right:70px;bottom:50px;z-index:20;font-size:13px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;opacity:0;transition:opacity .5s; }

/* ── PARTICLES ── */
.particle { position:absolute;border-radius:50%;background:var(--accent);animation:floatUp linear infinite;opacity:0; }
@keyframes floatUp { 0%{transform:translateY(0) translateX(0);opacity:0} 10%{opacity:.5} 90%{opacity:.2} 100%{transform:translateY(-1200px) translateX(var(--dx));opacity:0} }

#scene { position:absolute;inset:0;z-index:5; }

/* ══ SCENE: INTRO ══ */
.scene-intro { position:absolute;inset:0;display:flex;align-items:center; }
.intro-left  { flex:1;padding:0 80px; }
.intro-eyebrow { font-size:15px;letter-spacing:8px;text-transform:uppercase;color:var(--accent);margin-bottom:24px;opacity:0;transform:translateX(-40px);animation:slideRight .7s ease .5s forwards; }
.intro-title-wrap { overflow:hidden;margin-bottom:4px; }
.intro-title { font-family:'Bebas Neue',sans-serif;font-size:165px;line-height:.88;display:block;transform:translateY(105%);animation:revealUp .85s cubic-bezier(.22,1,.36,1) forwards; }
.intro-title.t1{animation-delay:.7s} .intro-title.t2{animation-delay:.88s} .intro-title.t3{animation-delay:1.06s;color:transparent;-webkit-text-stroke:2px rgba(255,0,64,.6)}
.intro-sub  { margin-top:36px;max-width:640px;font-size:21px;font-weight:300;line-height:1.65;color:var(--muted);opacity:0;transform:translateY(20px);animation:fadeUp .8s ease 1.5s forwards; }
.intro-sub strong{color:#fff;font-weight:700}
.intro-stat { position:absolute;right:80px;top:50%;transform:translateY(-50%);text-align:right;opacity:0;animation:fadeIn .8s ease 1.2s forwards; }
.intro-big-num  { font-family:'Bebas Neue',sans-serif;font-size:320px;line-height:1;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.05);user-select:none; }
.intro-big-label{ font-size:14px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);margin-top:-30px; }

/* ══ SCENE: POINT ══ */
.scene-point  { position:absolute;inset:0;display:flex;align-items:stretch; }
.point-left   { width:940px;padding:80px;display:flex;flex-direction:column;justify-content:center; }
.point-num-wrap    { overflow:hidden;margin-bottom:8px; }
.point-num    { font-family:'Bebas Neue',sans-serif;font-size:190px;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.08);transform:translateY(110%);animation:revealUp .7s cubic-bezier(.22,1,.36,1) .2s forwards; }
.point-heading-wrap{ overflow:hidden; }
.point-heading{ font-family:'Bebas Neue',sans-serif;font-size:108px;line-height:.92;color:#fff;transform:translateY(110%);animation:revealUp .8s cubic-bezier(.22,1,.36,1) .35s forwards; }
.point-divider{ width:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent);margin:28px 0;animation:lineGrow .6s ease .8s forwards; }
@keyframes lineGrow{to{width:200px}}
.point-body   { font-size:23px;font-weight:300;line-height:1.72;color:var(--muted);max-width:700px;opacity:0;transform:translateY(20px);animation:fadeUp .7s ease 1.0s forwards; }
.point-body strong{color:#fff;font-weight:600}
.point-tag    { display:inline-block;margin-top:32px;padding:8px 20px;border:1px solid rgba(255,0,64,.35);color:var(--accent);font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:0;animation:fadeIn .5s ease 1.3s forwards; }
.point-right  { flex:1;display:flex;align-items:center;justify-content:center;position:relative; }
.point-icon-circle { width:370px;height:370px;border-radius:50%;border:1px solid var(--card-border);background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:170px;transform:scale(0) rotate(-20deg);animation:popIn .8s cubic-bezier(.34,1.56,.64,1) .5s forwards;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(255,0,64,.1); }
@keyframes popIn{to{transform:scale(1) rotate(0deg)}}
.point-ring  { position:absolute;width:420px;height:420px;border-radius:50%;border:1px solid rgba(255,0,64,.15);animation:ringPulse 3s ease-in-out infinite; }
.point-ring2 { width:490px;height:490px;animation-delay:.5s; }
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.05);opacity:.8}}
.point-progress{ position:absolute;bottom:60px;left:80px;display:flex;gap:10px;opacity:0;animation:fadeIn .5s ease 1.5s forwards; }
.pdot        { width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s; }
.pdot.done   { background:var(--accent);box-shadow:0 0 10px var(--accent); }
.pdot.active { background:#fff;width:24px;border-radius:4px; }

/* ══ SCENE: OUTRO ══ */
.scene-outro { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center; }
.outro-line  { width:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 40px;animation:lineCenter .8s ease .3s forwards; }
@keyframes lineCenter{to{width:200px}}
.outro-main  { font-family:'Bebas Neue',sans-serif;font-size:130px;line-height:1;overflow:hidden; }
.outro-main span{ display:block;transform:translateY(110%);animation:revealUp .8s cubic-bezier(.22,1,.36,1) .5s forwards; }
.outro-sub   { font-size:24px;font-weight:300;letter-spacing:2px;color:var(--muted);margin-top:20px;opacity:0;animation:fadeIn .6s ease 1.1s forwards; }
.outro-cta   { margin-top:60px;padding:20px 60px;border:2px solid var(--accent);font-size:18px;letter-spacing:6px;text-transform:uppercase;color:var(--accent);opacity:0;transform:translateY(20px);animation:fadeUp .7s ease 1.4s forwards; }
.outro-icons { margin-top:50px;display:flex;gap:36px;opacity:0;animation:fadeIn .6s ease 1.7s forwards; }
.outro-icon-item{ display:flex;flex-direction:column;align-items:center;gap:8px; }
.outro-icon-item span{ font-size:42px; }
.outro-icon-item small{ font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase; }

/* ── SCENE WRAPPER ── */
.scene-wrapper{ position:absolute;inset:0;opacity:0;transition:opacity .4s ease; }
.scene-wrapper.visible{ opacity:1; }
.scene-wipe{ position:absolute;inset:0;z-index:50;background:var(--accent);transform-origin:left;transform:scaleX(0); }
.scene-wipe.wipe-in { animation:wipeIn  .35s cubic-bezier(.77,0,.18,1) forwards; }
.scene-wipe.wipe-out{ animation:wipeOut .35s cubic-bezier(.77,0,.18,1) forwards; }
@keyframes wipeIn { 0%{transform:scaleX(0)}100%{transform:scaleX(1)} }
@keyframes wipeOut{ 0%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right} }

/* ── HELPERS ── */
@keyframes revealUp  { to{transform:translateY(0)} }
@keyframes slideRight{ to{opacity:1;transform:translateX(0)} }
@keyframes fadeUp    { to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn    { to{opacity:1} }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="grid-layer"></div>
<div id="vignette"></div>
<div id="accent-bar"></div>
<div id="particles"></div>
<div id="progress-bar"></div>
<div id="channel-tag"></div>
<div id="scene"></div>

<script>
const CONFIG = __CONFIG__;

// Color schemes
const SCHEMES = {
  red_black:         {bg:'#0a0a0f',bg2:'#1a0812',accent:'#ff0040',accent2:'#ff6b35'},
  neon_dark:         {bg:'#050510',bg2:'#0a0f20',accent:'#00ff88',accent2:'#00ccff'},
  white_bold:        {bg:'#111',   bg2:'#1a1a1a',accent:'#ffffff',accent2:'#cccccc'},
  blue_professional: {bg:'#080f1a',bg2:'#0f1825',accent:'#0066ff',accent2:'#00aaff'},
  gold_dark:         {bg:'#0c0a00',bg2:'#1a1400',accent:'#ffd700',accent2:'#ffaa00'},
};
const sc = SCHEMES[CONFIG.color_scheme] || SCHEMES.red_black;
const r = document.documentElement;
r.style.setProperty('--bg',      sc.bg);
r.style.setProperty('--bg2',     sc.bg2);
r.style.setProperty('--accent',  sc.accent);
r.style.setProperty('--accent2', sc.accent2);

// Channel tag
const chEl = document.getElementById('channel-tag');
chEl.textContent = CONFIG.channel || '';
setTimeout(() => chEl.style.opacity='1', 1000);

// Particles
const pEl = document.getElementById('particles');
for (let i=0;i<25;i++){
  const p=document.createElement('div'); p.className='particle';
  const sz=Math.random()*4+2;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:-10px;--dx:${(Math.random()-.5)*300}px;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*12}s;opacity:0;`;
  pEl.appendChild(p);
}

// ── Scene builders ──
function buildIntro(sc){
  const lines=(sc.title_lines||[sc.title||'']).map((l,i)=>
    `<div class="intro-title-wrap"><span class="intro-title t${i+1}">${l}</span></div>`).join('');
  return `<div class="scene-intro">
    <div class="intro-left">
      <div class="intro-eyebrow">${sc.eyebrow||CONFIG.niche||''}</div>
      ${lines}
      <div class="intro-sub">${sc.subtitle||''}</div>
    </div>
    <div class="intro-stat">
      <div class="intro-big-num">${sc.count||''}</div>
      <div class="intro-big-label">${sc.count_label||''}</div>
    </div>
  </div>`;
}

function buildPoint(sc, pointIdx, pointTotal){
  let dots='';
  for(let i=0;i<pointTotal;i++){
    const cls=i<pointIdx?'done':(i===pointIdx?'active':'');
    dots+=`<div class="pdot ${cls}"></div>`;
  }
  return `<div class="scene-point">
    <div class="point-left">
      <div class="point-num-wrap"><div class="point-num">${sc.num||String(pointIdx+1).padStart(2,'0')}</div></div>
      <div class="point-heading-wrap"><div class="point-heading">${sc.heading||''}</div></div>
      <div class="point-divider"></div>
      <div class="point-body">${sc.body||''}</div>
      <div class="point-tag">${sc.tag||'Key Insight'}</div>
    </div>
    <div class="point-right">
      <div class="point-ring"></div>
      <div class="point-ring point-ring2"></div>
      <div class="point-icon-circle">${sc.emoji||'🧠'}</div>
    </div>
    <div class="point-progress">${dots}</div>
  </div>`;
}

function buildOutro(sc){
  const icons=(sc.icons||[]).map(ic=>
    `<div class="outro-icon-item"><span>${ic.emoji}</span><small>${ic.label}</small></div>`).join('');
  return `<div class="scene-outro">
    <div class="outro-line"></div>
    <div class="outro-main"><span>${sc.heading||'FOLLOW FOR MORE'}</span></div>
    <div class="outro-sub">${sc.sub||CONFIG.channel||''}</div>
    <div class="outro-cta">${sc.cta||'👍 Like & Subscribe'}</div>
    <div class="outro-icons">${icons}</div>
  </div>`;
}

// ── Engine ──
const sceneEl   = document.getElementById('scene');
const progressEl= document.getElementById('progress-bar');
const SCENES    = CONFIG.scenes;
const totalMs   = SCENES.reduce((s,sc)=>s+sc.duration_ms,0);
const pointScenes = SCENES.filter(s=>s.type==='point');
let elapsed=0, currentIdx=0;

function playScene(idx){
  if(idx>=SCENES.length) return;
  const sc=SCENES[idx];

  let html='';
  if(sc.type==='intro'){
    html=buildIntro(sc);
  } else if(sc.type==='point'){
    const pi=pointScenes.indexOf(sc);
    html=buildPoint(sc,pi,pointScenes.length);
  } else if(sc.type==='outro'){
    html=buildOutro(sc);
  }

  const wrapper=document.createElement('div');
  wrapper.className='scene-wrapper';
  wrapper.innerHTML=`<div class="scene-wipe"></div>`+html;
  sceneEl.appendChild(wrapper);

  const wipe=wrapper.querySelector('.scene-wipe');
  wipe.classList.add('wipe-in');
  setTimeout(()=>{ wipe.classList.remove('wipe-in'); wipe.classList.add('wipe-out'); wrapper.classList.add('visible'); },350);

  // progress
  const startPct=(elapsed/totalMs)*100;
  const endPct=((elapsed+sc.duration_ms)/totalMs)*100;
  progressEl.style.transition='none';
  progressEl.style.width=startPct+'%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    progressEl.style.transition=`width ${sc.duration_ms}ms linear`;
    progressEl.style.width=endPct+'%';
  }));

  setTimeout(()=>{
    wrapper.style.transition='opacity .3s';
    wrapper.style.opacity='0';
    setTimeout(()=>wrapper.remove(),320);
    elapsed+=sc.duration_ms;
    playScene(++currentIdx);
  }, sc.duration_ms);
}

playScene(0);
</script>
</body>
</html>
